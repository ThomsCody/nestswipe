services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rosen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rosen_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nestswipe}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rosen}"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      com.datadoghq.ad.logs: '[{"source": "postgresql", "service": "nestswipe-db"}]'

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rosen}:${POSTGRES_PASSWORD:-rosen_secret}@postgres:5432/${POSTGRES_DB:-nestswipe}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-listing-photos}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret}
      EMAIL_POLL_INTERVAL_MINUTES: ${EMAIL_POLL_INTERVAL_MINUTES:-5}
      PROXY_HOST: ${PROXY_HOST:-}
      PROXY_USER: ${PROXY_USER:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      # Datadog APM
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: nestswipe-backend
      DD_ENV: dev
      DD_TRACE_ENABLED: "true"
      DD_LOGS_INJECTION: "true"
    volumes:
      - ./oauth.json:/app/oauth.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    labels:
      com.datadoghq.ad.logs: '[{"source": "python", "service": "nestswipe-backend"}]'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_DD_APPLICATION_ID: ${VITE_DD_APPLICATION_ID:-}
        VITE_DD_CLIENT_TOKEN: ${VITE_DD_CLIENT_TOKEN:-}
        VITE_DD_SITE: ${VITE_DD_SITE:-datadoghq.com}
        VITE_DD_ENV: ${VITE_DD_ENV:-dev}
        VITE_DD_ALLOWED_TRACING_URL: ${VITE_DD_ALLOWED_TRACING_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_HOSTNAME: ${DD_HOSTNAME:-nestswipe-local}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_CONTAINER_EXCLUDE: "name:datadog-agent"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pgdata:
  minio_data:
