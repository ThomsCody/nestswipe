version: 1
disable_existing_loggers: false
formatters:
  json:
    class: pythonjsonlogger.json.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"
    rename_fields:
      asctime: timestamp
      levelname: level
      name: logger
handlers:
  default:
    formatter: json
    class: logging.StreamHandler
    stream: ext://sys.stderr
  access:
    formatter: json
    class: logging.StreamHandler
    stream: ext://sys.stdout
loggers:
  uvicorn:
    handlers: [default]
    level: INFO
    propagate: false
  uvicorn.error:
    handlers: [default]
    level: INFO
    propagate: false
  uvicorn.access:
    handlers: [access]
    level: INFO
    propagate: false
root:
  handlers: [default]
  level: INFO
